

<script>
/**
 * E:\emtac\projects\llm\MDEV_EMTAC\templates\index_partial\index_partial_5.html
 * EMTAC Assistant — Canonical Frontend Controller
 * DROP-IN replacement for index_partial_5 script
 * Backend-driven UI (NO frontend inference)
 */

document.addEventListener("DOMContentLoaded", function () {

    // ============================================================
    // Submit Question (AUTHORITATIVE)
    // ============================================================
    window.submitQuestion = function () {
        const inputEl = document.getElementById("user_input");
        const userIdEl = document.getElementById("user_id");
        const areaEl   = document.getElementById("area");
        const answerEl = document.getElementById("answer");

        const question = inputEl?.value.trim();
        const userId   = userIdEl?.value || "anonymous";
        const area     = areaEl?.value || "";

        if (!question) {
            alert("Please enter a question");
            return;
        }

        if (answerEl) {
            answerEl.innerHTML = "Processing your question...";
        }

        clearAllContainers();

        fetch("/chatbot/ask", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
                question,
                userId,
                area,
                clientType: "web"
            })
        })
        .then(res => res.json())
        .then(data => {
            console.log("[EMTAC] Full response:", data);
            console.log("[EMTAC] Blocks:", data.blocks);

            // ---------------- ANSWER ----------------
            if (answerEl) {
                answerEl.innerHTML =
                    data.answer || "No answer returned.";
            }

            // ---------------- BLOCKS ----------------
            const blocks = data.blocks || {};

            renderImages(blocks["images-container"]);
            renderDocuments(blocks["documents-container"]);
            renderParts(blocks["parts-container"]);
            renderDrawings(blocks["drawings-container"]);
        })
        .catch(err => {
            console.error("[EMTAC] Ask failed:", err);
            if (answerEl) {
                answerEl.innerHTML =
                    "Error processing your question. Please try again.";
            }
        })
        .finally(() => {
            if (inputEl) inputEl.value = "";
        });
    };

    // ============================================================
    // RENDERERS (PASSIVE BUCKETS)
    // ============================================================
    function renderImages(images = []) {
        const section = document.getElementById("thumbnails-section");
        if (!section) return;

        section.replaceChildren();

        images.forEach(img => {
            const el = document.createElement("img");
            el.src   = "/" + img.file_path.replace(/\\/g, "/");
            el.alt   = img.title || "Image";
            el.title = img.description || "";
            el.className = "thumbnail";
            section.appendChild(el);
        });
    }

    function renderDocuments(docs = []) {
    const section = document.getElementById("doc-links-section");
    if (!section) {
        console.warn("[renderDocuments] #doc-links-section not found");
        return;
    }

    section.replaceChildren();

    if (!Array.isArray(docs) || docs.length === 0) {
        const empty = document.createElement("div");
        empty.textContent = "No documents found.";
        empty.style.color = "#aaa";
        section.appendChild(empty);
        return;
    }

    docs.forEach(doc => {
        const wrapper = document.createElement("div");
        wrapper.className = "document-item";

        const title = document.createElement("div");
        title.className = "document-title";
        title.textContent =
            doc.title ||
            `Document #${doc.complete_document_id || doc.document_id || ""}`;

        wrapper.appendChild(title);

        if (Array.isArray(doc.chunks) && doc.chunks.length > 0) {
            const chunksDiv = document.createElement("div");
            chunksDiv.className = "document-chunks";

            doc.chunks.forEach(ch => {
                if (!ch?.text) return;

                const chunkDiv = document.createElement("div");
                chunkDiv.className = "document-chunk";
                chunkDiv.textContent = ch.text.trim();
                chunksDiv.appendChild(chunkDiv);
            });

            wrapper.appendChild(chunksDiv);
        }

        section.appendChild(wrapper);
    });
}


    function renderParts(parts = []) {
        const section = document.getElementById("parts-container");
        if (!section || !parts.length) return;

        section.replaceChildren();
        parts.forEach(p => {
            const div = document.createElement("div");
            div.textContent = p.name || p.part_number || "Part";
            section.appendChild(div);
        });
    }

    function renderDrawings(drawings = []) {
        const section = document.getElementById("drawing-section");
        if (!section || !drawings.length) return;

        section.replaceChildren();
        drawings.forEach(d => {
            const div = document.createElement("div");
            div.textContent = d.title || "Drawing";
            section.appendChild(div);
        });
    }

    // ============================================================
    // UTILITIES
    // ============================================================
    function clearAllContainers() {
        [
            "thumbnails-section",
            "doc-links-section",
            "parts-container",
            "drawing-section"
        ].forEach(id => {
            const el = document.getElementById(id);
            if (el) el.innerHTML = "";
        });
    }

    window.clearChat = function () {
        const answerEl = document.getElementById("answer");
        if (answerEl) {
            answerEl.innerHTML =
                "Welcome to EMTAC Assistant! Ask me anything about maintenance and technical assistance.";
        }
        clearAllContainers();
    };

    window.exportChat = function () {
        const text = document.getElementById("answer")?.innerText || "";
        const blob = new Blob([text], { type: "text/plain" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = "emtac-chat-export.txt";
        document.body.appendChild(a);
        a.click();
        URL.revokeObjectURL(url);
        document.body.removeChild(a);
    };

    window.showHelp = function () {
        const answerEl = document.getElementById("answer");
        if (!answerEl) return;
        answerEl.innerHTML = `
            <strong>EMTAC Assistant Help</strong><br><br>
            • Ask maintenance or technical questions<br>
            • Images appear in the Images panel<br>
            • Documents appear in the Documents panel<br>
            • Use Quick Actions to manage your chat<br><br>
            <em>Always verify with official SOPs</em>
        `;
    };

    // ============================================================
    // ENTER KEY HANDLING
    // ============================================================
    const input = document.getElementById("user_input");
    if (input) {
        input.addEventListener("keydown", e => {
            if (e.key === "Enter" && !e.shiftKey) {
                e.preventDefault();
                submitQuestion();
            }
        });
    }

    // ============================================================
    // PANEL TOGGLES
    // ============================================================
    document.querySelectorAll(".toggle-btn").forEach(btn => {
        btn.addEventListener("click", function () {
            const container = this.closest(".content-container");
            const body = container?.querySelector(".container-body");
            if (!body) return;

            const hidden = body.style.display === "none";
            body.style.display = hidden ? "flex" : "none";
            this.style.backgroundColor = hidden
                ? "rgba(255,255,255,0.1)"
                : "#ff4444";
        });
    });

});
</script>

    <div class="partial-header">
        <h1>EMTAC Assistant</h1>
        <p class="partial-description">Efficient Maintenance and Technical Assistance Chatbot</p>
    </div>

    <div class="container-grid grid-5">
        <!-- Main Chat Area -->
        <div class="content-container main-large">
            <div class="container-header">
                <h3>Chat Interface</h3>
                <button class="toggle-btn">💬</button>
            </div>
            <div class="container-body">

                    <div class="answer-section" id="answer-section">

                    </div>
                </div>

                <!-- User Input Area -->
                <div class="user-input-container">
                    <input type="text" id="user_id" placeholder="User ID" value="{{ employee_id }}" readonly style="display: none;">
                    <select id="area" style="display: none;">
                        <!-- Options will be populated here -->
                    </select>
                    <div class="input-and-button">
                        <textarea id="user_input" placeholder="Your Question" rows="2"></textarea>
                        <button id="submit-question" onclick="submitQuestion()">Ask</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Thumbnails Panel -->
        <div class="content-container">
            <div class="container-header">
                <h3>Images</h3>
                <button class="toggle-btn">🖼️</button>
            </div>
            <div class="container-body">
                <div class="thumbnails-section" id="thumbnails-section">
                    <!-- Thumbnails will be displayed here -->
                </div>
            </div>
        </div>

        <!-- Document Links Panel -->
    <div class="content-container">
        <div class="container-header">
            <h3>Documents</h3>
            <button class="toggle-btn">📄</button>
        </div>

        <div class="container-body"
             id="documents-container"
             data-role="documents-container">

            <!-- ✅ ALIAS FOR EXISTING JS RENDERERS -->
            <div class="doc-links-section"
                 id="doc-links-section"
                 data-role="documents-render-target">
                <!-- Document titles + chunks will be injected here -->
            </div>

        </div>
    </div>


        <!-- Quick Actions Panel -->
        <div class="content-container">
            <div class="container-header">
                <h3>Quick Actions</h3>
                <button class="toggle-btn">⚡</button>
            </div>
            <div class="container-body">
                <div class="quick-actions">
                    <button class="action-btn" onclick="clearChat()">Clear Chat</button>
                    <button class="action-btn" onclick="showHelp()">Help</button>
                </div>
            </div>
        </div>

        <!-- Feedback Panel -->
        <div class="content-container">
            <div class="container-header">
                <h3>Feedback</h3>
                <button class="toggle-btn">⭐</button>
            </div>
            <div class="container-body">
                <div class="comment-box">
                    <textarea id="user_comment" placeholder="Comment, suggestions or corrections"></textarea>
                    <div class="rating-section">
                        <label for="rating">Rating:</label>
                        <select id="rating">
                            {% for i in range(1, 11) %}
                                <option value="{{ i }}">{{ i }}</option>
                            {% endfor %}
                        </select>
                        <button id="submit_comment_rating">Submit</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
