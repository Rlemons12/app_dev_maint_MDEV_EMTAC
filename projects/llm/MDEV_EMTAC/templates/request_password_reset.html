<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Request Password Reset - EMTAC</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      padding: 0;
      min-height: 100vh;
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #1a1a1a;
      color: #222;
    }

    .container {
      width: 90vw;
      max-width: 32rem;
      padding: 1.5rem;
      background: rgba(255, 255, 255, 0.9);
      border-radius: 0.5rem;
      box-shadow: 0 0.125rem 0.25rem rgba(0, 0, 0, 0.3);
    }

    input,
    textarea,
    button {
      width: 100%;
      box-sizing: border-box;
      font-size: 1rem;
    }

    input,
    textarea {
      padding: 0.5rem;
      margin: 0.5rem 0 1rem;
      border: 1px solid #ccc;
      border-radius: 0.25rem;
    }

    button {
      padding: 0.75rem;
      border: none;
      border-radius: 0.25rem;
      background: #007bff;
      color: white;
      cursor: pointer;
    }

    button:hover {
      background: #0056b3;
    }

    a {
      display: inline-block;
      margin-top: 1rem;
    }
  </style>
</head>

<body>
  <div class="container">
    <h2>Request Password Reset</h2>

    <form method="POST" action="{{ url_for('login_bp.request_password_reset') }}">
      <label for="employee_id">Employee ID:</label>
      <input
        type="text"
        id="employee_id"
        name="employee_id"
        autocomplete="username"
        required
      >

      <label for="request_note">Note for Admin:</label>
      <textarea
        id="request_note"
        name="request_note"
        rows="4"
        placeholder="Optional note"
      ></textarea>

      <button type="submit">Submit Request</button>
    </form>

    <a href="{{ url_for('login_bp.login') }}">Back to Login</a>
  </div>
</body>
</html>
