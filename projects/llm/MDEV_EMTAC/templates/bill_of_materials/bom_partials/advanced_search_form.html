<!-- templates/bill_of_materials/bom_partials/advanced_search_form.html -->

<form
    method="POST"
    action="{{ url_for('create_bill_of_material_bp.create_bill_of_material') }}"
    id="advancedSearchFilterForm"
>
    <div class="form-group">
        <label for="filter_areaDropdown">Area:</label>
        <select name="area" id="filter_areaDropdown">
            <option value="">Select an area...</option>
        </select>
    </div>

    <div class="form-group">
        <label for="filter_equipmentGroupDropdown">Equipment Group:</label>
        <select name="equipment_group" id="filter_equipmentGroupDropdown">
            <option value="">Select an equipment group...</option>
        </select>
    </div>

    <div class="form-group">
        <label for="filter_modelDropdown">Model:</label>
        <select name="model" id="filter_modelDropdown">
            <option value="">Select a model...</option>
        </select>
    </div>

    <div class="form-group">
        <label for="filter_assetNumberDropdown">Asset Number:</label>
        <select name="asset_number" id="filter_assetNumberDropdown">
            <option value="">Select an asset number...</option>
        </select>
    </div>

    <div class="form-group">
        <label for="filter_locationDropdown">Location:</label>
        <select name="location" id="filter_locationDropdown">
            <option value="">Select a location...</option>
        </select>
    </div>

    <div class="form-actions">
        <input type="submit" id="filterBtn" class="btn btn-primary" value="Filter">
        <button type="button" id="resetFilterBtn" class="btn btn-secondary" onclick="window.clearAdvancedForm()">
            Clear Form
        </button>
    </div>
</form>
