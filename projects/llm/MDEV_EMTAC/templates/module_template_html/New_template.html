{% extends 'module_template_html/base_template.html' %}

{% block extra_head %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/module_template/panel_layouts.css') }}">
<style>
    .workspace-shell {
        min-height: 100%;
    }

    .workspace-shell .mt-layout {

{% endblock %}

{% block content %}

{% endblock %}

{% block extra_scripts %}

{% endblock %}
