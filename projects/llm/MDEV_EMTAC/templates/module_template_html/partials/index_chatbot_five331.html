<div class="five331-partial-template">
  <div class="five331-layout">
    <!-- Sidebar -->
    <aside id="five331-sidebar" class="five331-sidebar five331-closed">
      <div class="five331-sidebar-scroll">
        <div class="five331-sidebar-section">
          <h3>Quick Actions</h3>

          <div class="five331-quick-actions">
            <button id="clear-chat" type="button">Clear Chat</button>

            <button
              id="conversation-mode-toggle"
              class="five331-conversation-toggle is-on"
              type="button"
              aria-pressed="true"
              data-conversation-enabled="true"
              title="When ON, the assistant remembers the current conversation. When OFF, every question is treated as a new topic."
            >
              Conversation: ON
            </button>

            <div id="conversation-mode-status" class="five331-conversation-status">
              Current chat memory is enabled.
            </div>

            <button id="show-help" type="button">Help</button>
          </div>
        </div>

        <div class="five331-sidebar-section">
          <h3>Feedback</h3>
          <textarea id="comment" placeholder="Comment, suggestions or corrections"></textarea>
          <div class="five331-rating-section">
            <label for="rating">Rating:</label>
            <select id="rating">
              {% for i in range(1, 11) %}
                <option value="{{ i }}">{{ i }}</option>
              {% endfor %}
            </select>
            <button id="submit_comment_rating" type="button">Submit</button>
          </div>
        </div>

        <div class="five331-sidebar-section">
          <h3>Voice</h3>
          <button id="toggle-voice" type="button">Toggle Text-to-Speech</button>
          <select id="voice-select"></select>
        </div>
      </div>
    </aside>

    <!-- Main area -->
    <main class="five331-main">
      <!-- Chat -->
      <section class="five331-chat">
        <header class="five331-chat-header">
          <button type="button" class="five331-sidebar-toggle" onclick="five331ToggleSidebar()">☰</button>
          <h3>EMTAC Assistant</h3>
        </header>

        <div class="five331-chat-body">
          <div id="chat-area" class="five331-chat-area">
            <div class="five331-answer-section">
              <p id="answer">Welcome to EMTAC Assistant! Ask me anything about maintenance and technical assistance.</p>
            </div>
          </div>

          <div class="five331-chat-input">
            <input type="text" id="user_id" value="{{ employee_id }}" readonly hidden>
            <input type="hidden" id="conversation_enabled" value="true">
            <input type="hidden" id="conversation_mode" value="conversation">
            <select id="area" hidden></select>
            <textarea id="user_input" placeholder="Your Question" rows="2"></textarea>
            <button id="submit-question" type="button">Ask</button>
          </div>
        </div>
      </section>

      <!-- Right side panels -->
      <section class="five331-panels">
        <!-- Images -->
        <div class="five331-panel is-collapsed">
          <div class="five331-panel-head">
            <span>Images</span>
            <button class="five331-panel-toggle" type="button" aria-expanded="false">Open</button>
          </div>
          <div class="five331-panel-body" id="images-container">
            <div id="thumbnails-section"></div>
          </div>
        </div>

        <!-- Documents -->
        <div class="five331-panel is-collapsed">
          <div class="five331-panel-head">
            <span>Documents</span>
            <button class="five331-panel-toggle" type="button" aria-expanded="false">Open</button>
          </div>
          <div class="five331-panel-body" id="documents-container">
            <div id="doc-links-section"></div>
          </div>
        </div>

        <!-- Drawings -->
        <div class="five331-panel is-collapsed">
          <div class="five331-panel-head">
            <span>Drawings</span>
            <button class="five331-panel-toggle" type="button" aria-expanded="false">Open</button>
          </div>
          <div class="five331-panel-body" id="drawings-container">
            <div id="drawing-area-bar" class="drawing-bar"></div>
            <div id="drawing-model-bar" class="drawing-bar"></div>
            <div id="drawing-section"></div>
          </div>
        </div>

        <!-- Parts -->
        <div class="five331-panel is-collapsed">
          <div class="five331-panel-head">
            <span>Parts</span>
            <button class="five331-panel-toggle" type="button" aria-expanded="false">Open</button>
          </div>
          <div class="five331-panel-body" id="parts-container">
            <!-- Parts injected by JS -->
          </div>
        </div>
      </section>
    </main>
  </div>
</div>

<script>
(function () {
  let isSubmitting = false;

  const CONVERSATION_STORAGE_KEY = "emtac_conversation_enabled";

  function readStoredConversationEnabled() {
    try {
      const storedValue = localStorage.getItem(CONVERSATION_STORAGE_KEY);

      if (storedValue === null || storedValue === undefined) {
        return true;
      }

      return storedValue === "true";
    } catch (error) {
      return true;
    }
  }

  function writeStoredConversationEnabled(enabled) {
    try {
      localStorage.setItem(CONVERSATION_STORAGE_KEY, String(Boolean(enabled)));
    } catch (error) {
      // Ignore localStorage errors.
    }
  }

  let conversationEnabled = readStoredConversationEnabled();

  function clearConversationIds() {
    /*
      Defensive because different chat JS files may use different global names.

      Important:
      When Conversation is OFF, the next /chatbot/ask request must not send
      the old chat_sessions.session_id.
    */

    try { window.EMTAC_ACTIVE_CONVERSATION_ID = null; } catch (error) {}
    try { window.currentConversationId = null; } catch (error) {}
    try { window.lastConversationId = null; } catch (error) {}
    try { window.conversationId = null; } catch (error) {}
    try { window.activeConversationId = null; } catch (error) {}
    try { window.current_conversation_id = null; } catch (error) {}

    try {
      sessionStorage.removeItem("emtac_active_conversation_id");
    } catch (error) {
      // Ignore sessionStorage errors.
    }

    if (typeof window.clearEMTACActiveConversationId === "function") {
      try {
        window.clearEMTACActiveConversationId();
      } catch (error) {
        // Ignore helper errors.
      }
    }
  }

  function syncConversationModeGlobals() {
    const enabledInput = document.getElementById("conversation_enabled");
    const modeInput = document.getElementById("conversation_mode");

    if (enabledInput) {
      enabledInput.value = conversationEnabled ? "true" : "false";
    }

    if (modeInput) {
      modeInput.value = conversationEnabled ? "conversation" : "single_turn";
    }

    window.EMTAC_CONVERSATION_ENABLED = conversationEnabled;
    window.five331ConversationEnabled = conversationEnabled;
    window.emtacConversationEnabled = conversationEnabled;
    window.conversationEnabled = conversationEnabled;
    window.conversationMode = conversationEnabled ? "conversation" : "single_turn";
  }

  function updateConversationModeButton() {
    const btn = document.getElementById("conversation-mode-toggle");
    const status = document.getElementById("conversation-mode-status");

    syncConversationModeGlobals();

    if (btn) {
      btn.dataset.conversationEnabled = conversationEnabled ? "true" : "false";
      btn.setAttribute("aria-pressed", conversationEnabled ? "true" : "false");

      if (conversationEnabled) {
        btn.textContent = "Conversation: ON";
        btn.classList.add("is-on");
        btn.classList.remove("is-off");
        btn.title = "Conversation memory is ON. Follow-up questions can use the current chat context.";
      } else {
        btn.textContent = "Conversation: OFF";
        btn.classList.add("is-off");
        btn.classList.remove("is-on");
        btn.title = "Single-turn mode is ON. Every question is treated as a new topic.";
      }
    }

    if (status) {
      if (conversationEnabled) {
        status.textContent = "Current chat memory is enabled.";
        status.classList.remove("is-off");
      } else {
        status.textContent = "Single-turn mode: every question is treated as a new topic.";
        status.classList.add("is-off");
      }
    }
  }

  function setConversationEnabled(enabled, options) {
    const opts = options || {};
    const previousValue = conversationEnabled;

    conversationEnabled = Boolean(enabled);

    writeStoredConversationEnabled(conversationEnabled);

    if (!conversationEnabled) {
      clearConversationIds();
    }

    updateConversationModeButton();

    if (previousValue !== conversationEnabled) {
      try {
        window.dispatchEvent(
          new CustomEvent("emtac:conversation-mode-changed", {
            detail: {
              conversation_enabled: conversationEnabled,
              conversation_mode: conversationEnabled ? "conversation" : "single_turn"
            }
          })
        );
      } catch (error) {
        // Ignore CustomEvent errors.
      }
    }

    if (opts.log !== false) {
      console.info(
        "[conversation-mode]",
        conversationEnabled ? "Conversation enabled" : "Conversation disabled / single-turn mode"
      );
    }
  }

  function getConversationPayloadPatch() {
    /*
      chatbot.js uses this to patch the /chatbot/ask payload.

      Sends:
        conversation_enabled
        conversation_mode
        conversation_id
    */

    let outgoingConversationId = null;

    if (conversationEnabled) {
      outgoingConversationId =
        window.currentConversationId ||
        window.conversationId ||
        window.activeConversationId ||
        window.EMTAC_ACTIVE_CONVERSATION_ID ||
        window.current_conversation_id ||
        null;
    }

    return {
      conversation_enabled: Boolean(conversationEnabled),
      conversation_mode: conversationEnabled ? "conversation" : "single_turn",
      conversation_id: conversationEnabled ? outgoingConversationId : null
    };
  }

  function safeSubmit() {
    if (isSubmitting) {
      console.warn("[submit] blocked duplicate submit");
      return;
    }

    if (typeof submitQuestion !== "function") {
      console.error("submitQuestion not found");
      return;
    }

    isSubmitting = true;

    try {
      syncConversationModeGlobals();

      if (!conversationEnabled) {
        clearConversationIds();
      }

      submitQuestion();
    } finally {
      setTimeout(() => {
        isSubmitting = false;
      }, 300);
    }
  }

  function bindFive331ConversationModeToggle() {
    const btn = document.getElementById("conversation-mode-toggle");

    if (!btn || btn.dataset.five331Bound === "true") {
      return;
    }

    btn.dataset.five331Bound = "true";

    btn.addEventListener("click", function (e) {
      e.preventDefault();
      e.stopPropagation();

      setConversationEnabled(!conversationEnabled);
    });
  }

  function setFive331PanelExpanded(panel, expanded) {
    if (!panel) {
      return;
    }

    const shouldExpand = Boolean(expanded);
    const btn = panel.querySelector(".five331-panel-toggle");
    const body = panel.querySelector(".five331-panel-body");

    panel.classList.toggle("is-collapsed", !shouldExpand);

    if (body) {
      if (shouldExpand) {
        body.hidden = false;
        body.style.removeProperty("display");
      } else {
        body.hidden = true;
        body.style.setProperty("display", "none", "important");
      }
    }

    if (btn) {
      btn.setAttribute("aria-expanded", shouldExpand ? "true" : "false");
      btn.textContent = shouldExpand ? "Collapse" : "Open";
    }
  }

  function syncFive331PanelStates() {
    document.querySelectorAll(".five331-panel").forEach(function (panel) {
      const expanded = !panel.classList.contains("is-collapsed");
      setFive331PanelExpanded(panel, expanded);
    });
  }

  function bindFive331PanelToggles() {
    const panelContainer = document.querySelector(".five331-panels");

    if (!panelContainer || panelContainer.dataset.five331PanelToggleBound === "true") {
      return;
    }

    panelContainer.dataset.five331PanelToggleBound = "true";

    panelContainer.addEventListener("click", function (e) {
      const btn = e.target.closest(".five331-panel-toggle");

      if (!btn || !panelContainer.contains(btn)) {
        return;
      }

      e.preventDefault();
      e.stopImmediatePropagation();

      const panel = btn.closest(".five331-panel");

      if (!panel) {
        return;
      }

      const currentlyExpanded = !panel.classList.contains("is-collapsed");

      setFive331PanelExpanded(panel, !currentlyExpanded);
    }, true);
  }

  function bindFive331SubmitControls() {
    const submitBtn = document.getElementById("submit-question");
    const userInput = document.getElementById("user_input");

    if (submitBtn && submitBtn.dataset.five331Bound !== "true") {
      submitBtn.dataset.five331Bound = "true";

      submitBtn.addEventListener("click", function (e) {
        e.preventDefault();
        safeSubmit();
      });
    }

    if (userInput && userInput.dataset.five331Bound !== "true") {
      userInput.dataset.five331Bound = "true";

      userInput.addEventListener("keydown", function (e) {
        if (e.key === "Enter" && !e.shiftKey) {
          e.preventDefault();
          safeSubmit();
        }
      });
    }
  }

  function initializeFive331Partial() {
    updateConversationModeButton();
    syncFive331PanelStates();
    bindFive331ConversationModeToggle();
    bindFive331SubmitControls();
    bindFive331PanelToggles();
  }

  window.setFive331ConversationEnabled = setConversationEnabled;

  window.isFive331ConversationEnabled = function () {
    return Boolean(conversationEnabled);
  };

  window.getFive331ConversationPayloadPatch = getConversationPayloadPatch;
  window.updateFive331ConversationModeButton = updateConversationModeButton;
  window.initializeFive331Partial = initializeFive331Partial;

  if (document.readyState === "loading") {
    document.addEventListener("DOMContentLoaded", initializeFive331Partial);
  } else {
    initializeFive331Partial();
  }
})();

function five331ToggleSidebar() {
  const sidebar = document.getElementById("five331-sidebar");

  if (sidebar) {
    sidebar.classList.toggle("five331-closed");
  }
}

window.five331ToggleSidebar = five331ToggleSidebar;
</script>
