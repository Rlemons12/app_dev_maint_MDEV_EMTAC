<div class="chatbot-generic">
  <div class="chatbot-generic__layout">

    <!-- Main chat column -->
    <section class="chatbot-generic__chat">
      <header class="chatbot-generic__chat-header">
        <div class="chatbot-generic__title-wrap">
          <h2 class="chatbot-generic__title">EMTAC Assistant</h2>
          <p class="chatbot-generic__subtitle">
            Ask a question and review related images, documents, drawings, and parts.
          </p>
        </div>
      </header>

      <div class="chatbot-generic__chat-body">
        <div id="chat-area" class="chatbot-generic__chat-area">
          <div class="chatbot-generic__message chatbot-generic__message--assistant">
            <p id="answer">
              Welcome to EMTAC Assistant! Ask me anything about maintenance and technical assistance.
            </p>
          </div>
        </div>

        <div class="chatbot-generic__input-bar">
          <input
            type="text"
            id="user_id"
            value="{{ employee_id|default('') }}"
            readonly
            hidden
          >

          <select id="area" hidden></select>

          <label for="user_input" class="sr-only">Your question</label>
          <textarea
            id="user_input"
            class="chatbot-generic__textarea"
            placeholder="Type your question here..."
            rows="3"
          ></textarea>

          <button id="submit-question" type="button" class="chatbot-generic__submit">
            Ask
          </button>
        </div>
      </div>
    </section>

    <!-- Results column -->
    <aside class="chatbot-generic__results">

      <section class="chatbot-generic__panel">
        <div class="chatbot-generic__panel-header">
          <h3>Images</h3>
        </div>
        <div class="chatbot-generic__panel-body">
          <div id="thumbnails-section"></div>
        </div>
      </section>

      <section class="chatbot-generic__panel">
        <div class="chatbot-generic__panel-header">
          <h3>Documents</h3>
        </div>
        <div class="chatbot-generic__panel-body">
          <div id="doc-links-section"></div>
        </div>
      </section>

      <section class="chatbot-generic__panel">
        <div class="chatbot-generic__panel-header">
          <h3>Drawings</h3>
        </div>
        <div class="chatbot-generic__panel-body">
          <div id="drawing-area-bar" class="chatbot-generic__toolbar"></div>
          <div id="drawing-model-bar" class="chatbot-generic__toolbar"></div>
          <div id="drawing-section"></div>
        </div>
      </section>

      <section class="chatbot-generic__panel">
        <div class="chatbot-generic__panel-header">
          <h3>Parts</h3>
        </div>
        <div class="chatbot-generic__panel-body">
          <div id="parts-container"></div>
        </div>
      </section>

    </aside>
  </div>
</div>

<style>
  .chatbot-generic {
    height: 100%;
    min-height: 0;
    width: 100%;
    min-width: 0;
    color: #f3f3f3;
  }

  .chatbot-generic * {
    box-sizing: border-box;
  }

  .chatbot-generic .sr-only {
    position: absolute;
    width: 1px;
    height: 1px;
    padding: 0;
    margin: -1px;
    overflow: hidden;
    clip: rect(0, 0, 0, 0);
    white-space: nowrap;
    border: 0;
  }

  .chatbot-generic__layout {
    display: grid;
    grid-template-columns: minmax(0, 2fr) minmax(320px, 1fr);
    gap: 12px;
    height: 100%;
    min-height: 0;
    width: 100%;
    min-width: 0;
  }

  .chatbot-generic__chat,
  .chatbot-generic__results,
  .chatbot-generic__panel {
    min-height: 0;
    min-width: 0;
  }

  .chatbot-generic__chat {
    display: flex;
    flex-direction: column;
    background: rgba(255, 255, 255, 0.04);
    border: 1px solid rgba(255, 255, 255, 0.08);
    border-radius: 10px;
    overflow: hidden;
  }

  .chatbot-generic__chat-header {
    padding: 14px 16px;
    border-bottom: 1px solid rgba(255, 255, 255, 0.08);
    background: rgba(0, 0, 0, 0.18);
  }

  .chatbot-generic__title {
    margin: 0;
    font-size: 1.2rem;
    line-height: 1.2;
  }

  .chatbot-generic__subtitle {
    margin: 6px 0 0 0;
    font-size: 0.92rem;
    opacity: 0.8;
  }

  .chatbot-generic__chat-body {
    display: flex;
    flex-direction: column;
    flex: 1 1 auto;
    min-height: 0;
  }

  .chatbot-generic__chat-area {
    flex: 1 1 auto;
    min-height: 0;
    overflow-y: auto;
    padding: 14px;
    background: rgba(0, 0, 0, 0.14);
  }

  .chatbot-generic__message {
    max-width: 100%;
    padding: 12px 14px;
    border-radius: 10px;
    line-height: 1.45;
    white-space: normal;
    word-break: break-word;
  }

  .chatbot-generic__message--assistant {
    background: rgba(255, 255, 255, 0.06);
    border-left: 4px solid #39ff14;
  }

  .chatbot-generic__message p {
    margin: 0;
  }

  .chatbot-generic__input-bar {
    display: grid;
    grid-template-columns: minmax(0, 1fr) auto;
    gap: 10px;
    padding: 12px;
    border-top: 1px solid rgba(255, 255, 255, 0.08);
    background: rgba(255, 255, 255, 0.03);
    align-items: end;
  }

  .chatbot-generic__textarea {
    width: 100%;
    min-height: 72px;
    max-height: 180px;
    resize: vertical;
    padding: 10px 12px;
    border-radius: 8px;
    border: 1px solid rgba(255, 255, 255, 0.14);
    background: #202020;
    color: #f3f3f3;
    font: inherit;
  }

  .chatbot-generic__submit {
    height: fit-content;
    padding: 10px 16px;
    border: none;
    border-radius: 8px;
    background: #39ff14;
    color: #111;
    font-weight: 700;
    cursor: pointer;
  }

  .chatbot-generic__submit:hover {
    filter: brightness(0.95);
  }

  .chatbot-generic__results {
    display: grid;
    grid-template-rows: repeat(4, minmax(0, 1fr));
    gap: 12px;
    min-height: 0;
  }

  .chatbot-generic__panel {
    display: flex;
    flex-direction: column;
    background: rgba(255, 255, 255, 0.04);
    border: 1px solid rgba(255, 255, 255, 0.08);
    border-radius: 10px;
    overflow: hidden;
  }

  .chatbot-generic__panel-header {
    padding: 10px 12px;
    background: rgba(0, 0, 0, 0.18);
    border-bottom: 1px solid rgba(255, 255, 255, 0.08);
  }

  .chatbot-generic__panel-header h3 {
    margin: 0;
    font-size: 1rem;
  }

  .chatbot-generic__panel-body {
    flex: 1 1 auto;
    min-height: 0;
    overflow-y: auto;
    padding: 12px;
  }

  .chatbot-generic__toolbar {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 10px;
    padding-bottom: 8px;
    border-bottom: 1px solid rgba(255, 255, 255, 0.08);
  }

  @media (max-width: 1100px) {
    .chatbot-generic__layout {
      grid-template-columns: 1fr;
      grid-template-rows: minmax(320px, 1.4fr) minmax(320px, 1fr);
    }

    .chatbot-generic__results {
      grid-template-columns: repeat(2, minmax(0, 1fr));
      grid-template-rows: repeat(2, minmax(220px, 1fr));
    }
  }

  @media (max-width: 700px) {
    .chatbot-generic__input-bar {
      grid-template-columns: 1fr;
    }

    .chatbot-generic__results {
      grid-template-columns: 1fr;
      grid-template-rows: repeat(4, minmax(180px, 1fr));
    }
  }
</style>

<script>
  (function () {
    let isSubmitting = false;

    function safeSubmit() {
      if (isSubmitting) {
        return;
      }

      if (typeof submitQuestion !== "function") {
        console.error("submitQuestion not found");
        return;
      }

      isSubmitting = true;

      try {
        submitQuestion();
      } finally {
        setTimeout(function () {
          isSubmitting = false;
        }, 300);
      }
    }

    document.addEventListener("DOMContentLoaded", function () {
      const submitBtn = document.getElementById("submit-question");
      const userInput = document.getElementById("user_input");

      if (submitBtn) {
        submitBtn.addEventListener("click", function (e) {
          e.preventDefault();
          safeSubmit();
        });
      }

      if (userInput) {
        userInput.addEventListener("keydown", function (e) {
          if (e.key === "Enter" && !e.shiftKey) {
            e.preventDefault();
            safeSubmit();
          }
        });
      }
    });
  })();
</script>
