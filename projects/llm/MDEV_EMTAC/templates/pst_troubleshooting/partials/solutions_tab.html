<!-- Solutions Tab Content Partial -->
<div class="tab-pane fade pst-tab-pane" id="solution" role="tabpanel" aria-labelledby="solution-tab">

    <section class="module-panel pst-panel">
        <header class="module-panel-header pst-panel-header">
            <div>
                <h4 class="module-panel-title mb-1" id="selected-problem-name">
                    Problem Solutions
                </h4>
                <p class="module-panel-subtitle mb-0">
                    Manage solutions connected to the selected problem.
                </p>
            </div>
        </header>

        <div class="module-panel-body pst-panel-body">
            <div class="row g-3">

                <div class="col-12 col-xl-5">
                    <div class="module-card pst-section-card h-100">
                        <div class="module-card-header">
                            <h5 class="mb-0">Related Solutions</h5>
                        </div>

                        <div class="module-card-body">
                            <div class="mb-3">
                                <label for="existing_solutions" class="form-label">
                                    Related Solutions
                                </label>

                                <select
                                    class="form-select"
                                    id="existing_solutions"
                                    size="8"
                                    multiple>
                                </select>
                            </div>

                            <div class="d-flex justify-content-end">
                                <button
                                    type="button"
                                    id="removeSolutionsBtn"
                                    class="btn btn-danger">
                                    Remove Selected Solutions
                                </button>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="col-12 col-xl-7">
                    <div class="module-card pst-section-card h-100">
                        <div class="module-card-header">
                            <h5 class="mb-0">Add New Solution</h5>
                        </div>

                        <div class="module-card-body">
                            <div class="mb-3">
                                <label for="new_solution_name" class="form-label">
                                    New Solution Name
                                </label>
                                <input
                                    type="text"
                                    class="form-control"
                                    id="new_solution_name"
                                    name="new_solution_name"
                                    placeholder="Enter New Solution Name">
                            </div>

                            <div class="mb-3">
                                <label for="new_solution_description" class="form-label">
                                    New Solution Description
                                </label>
                                <textarea
                                    class="form-control"
                                    id="new_solution_description"
                                    name="new_solution_description"
                                    rows="4"
                                    placeholder="Enter New Solution Description"></textarea>
                            </div>

                            <div class="d-flex justify-content-end">
                                <button
                                    type="button"
                                    id="addSolutionBtn"
                                    class="btn btn-success">
                                    Add Solution
                                </button>
                            </div>
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </section>

</div>
