<!-- Position Template Partial -->
<template id="position-template">
    <section
        class="position-section module-card pst-position-card mb-3"
        data-position-id="temp-__UNIQUE__">

        <header class="module-card-header pst-position-card-header">
            <div>
                <h5 class="mb-1">Position Assignment</h5>
                <p class="mb-0 text-muted">
                    Select the hierarchy values for this task position.
                </p>
            </div>
        </header>

        <div class="module-card-body pst-position-card-body">
            <div class="row g-3">

                <div class="col-12 col-md-6 col-xl-4">
                    <label for="areaDropdown__UNIQUE__" class="form-label">Area</label>
                    <select class="form-select areaDropdown" id="areaDropdown__UNIQUE__">
                        <option value="">Select Area</option>
                    </select>
                </div>

                <div class="col-12 col-md-6 col-xl-4">
                    <label for="equipmentGroupDropdown__UNIQUE__" class="form-label">
                        Equipment Group
                    </label>
                    <select
                        class="form-select equipmentGroupDropdown"
                        id="equipmentGroupDropdown__UNIQUE__"
                        disabled>
                        <option value="">Select Equipment Group</option>
                    </select>
                </div>

                <div class="col-12 col-md-6 col-xl-4">
                    <label for="modelDropdown__UNIQUE__" class="form-label">Model</label>
                    <select
                        class="form-select modelDropdown"
                        id="modelDropdown__UNIQUE__"
                        disabled>
                        <option value="">Select Model</option>
                    </select>
                </div>

                <div class="col-12 col-md-6 col-xl-4">
                    <label for="assetNumberInput__UNIQUE__" class="form-label">
                        Asset Number
                    </label>
                    <select
                        class="form-select assetNumberInput"
                        id="assetNumberInput__UNIQUE__"
                        disabled>
                        <option value="">Select Asset Number</option>
                    </select>
                </div>

                <div class="col-12 col-md-6 col-xl-4">
                    <label for="locationInput__UNIQUE__" class="form-label">Location</label>
                    <select
                        class="form-select locationInput"
                        id="locationInput__UNIQUE__"
                        disabled>
                        <option value="">Select Location</option>
                    </select>
                </div>

                <div class="col-12 col-md-6 col-xl-4">
                    <label for="assembliesDropdown__UNIQUE__" class="form-label">
                        Subassembly
                    </label>
                    <select
                        class="form-select assembliesDropdown"
                        id="assembliesDropdown__UNIQUE__"
                        disabled>
                        <option value="">Select Subassembly</option>
                    </select>
                </div>

                <div class="col-12 col-md-6 col-xl-4">
                    <label for="subassembliesDropdown__UNIQUE__" class="form-label">
                        Component Assembly
                    </label>
                    <select
                        class="form-select subassembliesDropdown"
                        id="subassembliesDropdown__UNIQUE__"
                        disabled>
                        <option value="">Select Component Assembly</option>
                    </select>
                </div>

                <div class="col-12 col-md-6 col-xl-4">
                    <label for="assemblyViewsDropdown__UNIQUE__" class="form-label">
                        Assembly View
                    </label>
                    <select
                        class="form-select assemblyViewsDropdown"
                        id="assemblyViewsDropdown__UNIQUE__"
                        disabled>
                        <option value="">Select Assembly View</option>
                    </select>
                </div>

                <div class="col-12 col-md-6 col-xl-4">
                    <label for="siteLocationDropdown__UNIQUE__" class="form-label">
                        Site Location
                    </label>
                    <select
                        class="form-select siteLocationDropdown"
                        id="siteLocationDropdown__UNIQUE__">
                        <option value="">Select Site Location</option>
                    </select>
                </div>

            </div>

            <div class="d-flex justify-content-end gap-2 mt-4">
                <button
                    type="button"
                    class="btn btn-primary savePositionBtn"
                    id="savePositionBtn__UNIQUE__">
                    Save Position
                </button>

                <button
                    type="button"
                    class="btn btn-danger removePositionBtn"
                    id="removePositionBtn__UNIQUE__">
                    Remove Position
                </button>
            </div>
        </div>
    </section>
</template>
