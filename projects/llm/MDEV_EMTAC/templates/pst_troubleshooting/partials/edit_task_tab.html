<!-- Edit Task Tab Content Partial -->
<div class="tab-pane fade pst-tab-pane" id="edit-task" role="tabpanel" aria-labelledby="edit-task-tab">

    <section class="module-panel pst-panel">
        <header class="module-panel-header pst-panel-header">
            <div>
                <h4 class="module-panel-title mb-1">Edit Task</h4>
                <p class="module-panel-subtitle mb-0">
                    Update task details and manage related positions, images, parts, drawings, documents, and tools.
                </p>
            </div>
        </header>

        <div class="module-panel-body pst-panel-body">

            <section class="module-card pst-section-card mb-3">
                <div class="module-card-header">
                    <h5 class="mb-0">Task Details</h5>
                </div>

                <div class="module-card-body">
                    <div class="row g-3">
                        <div class="col-12 col-xl-5">
                            <label for="pst_task_edit_task_name" class="form-label">Task Name</label>
                            <input
                                type="text"
                                class="form-control"
                                id="pst_task_edit_task_name"
                                placeholder="Enter Task Name">
                        </div>

                        <div class="col-12 col-xl-7">
                            <label for="pst_task_edit_task_description" class="form-label">
                                Task Description
                            </label>
                            <textarea
                                class="form-control"
                                id="pst_task_edit_task_description"
                                rows="3"
                                placeholder="Enter Task Description"></textarea>
                        </div>
                    </div>

                    <div class="d-flex justify-content-end mt-3">
                        <button
                            type="button"
                            id="updateTaskDetailsBtn"
                            class="btn btn-primary">
                            Update Task Name and Description
                        </button>
                    </div>
                </div>
            </section>

            <section class="module-card pst-section-card">
                <div class="module-card-header pst-subtab-header">
                    <ul class="nav nav-tabs module-tabs" id="editTaskSubTabs" role="tablist">
                        <li class="nav-item" role="presentation">
                            <button
                                class="nav-link active"
                                id="task-details-tab"
                                data-bs-toggle="tab"
                                data-bs-target="#task-details"
                                type="button"
                                role="tab"
                                aria-controls="task-details"
                                aria-selected="true">
                                Task Details
                            </button>
                        </li>

                        <li class="nav-item" role="presentation">
                            <button
                                class="nav-link"
                                id="task-images-tab"
                                data-bs-toggle="tab"
                                data-bs-target="#task-images"
                                type="button"
                                role="tab"
                                aria-controls="task-images"
                                aria-selected="false">
                                Images
                            </button>
                        </li>

                        <li class="nav-item" role="presentation">
                            <button
                                class="nav-link"
                                id="task-parts-tab"
                                data-bs-toggle="tab"
                                data-bs-target="#task-parts"
                                type="button"
                                role="tab"
                                aria-controls="task-parts"
                                aria-selected="false">
                                Parts
                            </button>
                        </li>

                        <li class="nav-item" role="presentation">
                            <button
                                class="nav-link"
                                id="task-drawings-tab"
                                data-bs-toggle="tab"
                                data-bs-target="#task-drawings"
                                type="button"
                                role="tab"
                                aria-controls="task-drawings"
                                aria-selected="false">
                                Drawings
                            </button>
                        </li>

                        <li class="nav-item" role="presentation">
                            <button
                                class="nav-link"
                                id="task-documents-tab"
                                data-bs-toggle="tab"
                                data-bs-target="#task-documents"
                                type="button"
                                role="tab"
                                aria-controls="task-documents"
                                aria-selected="false">
                                Documents
                            </button>
                        </li>

                        <li class="nav-item" role="presentation">
                            <button
                                class="nav-link"
                                id="task-tools-tab"
                                data-bs-toggle="tab"
                                data-bs-target="#task-tools"
                                type="button"
                                role="tab"
                                aria-controls="task-tools"
                                aria-selected="false">
                                Tools
                            </button>
                        </li>
                    </ul>
                </div>

                <div class="module-card-body">
                    <div class="tab-content" id="editTaskSubTabContent">

                        <div
                            class="tab-pane fade show active"
                            id="task-details"
                            role="tabpanel"
                            aria-labelledby="task-details-tab">

                            <div class="module-card pst-nested-card">
                                <div class="module-card-header">
                                    <h5 class="mb-0">Task Positions</h5>
                                </div>

                                <div class="module-card-body">
                                    <div id="pst_task_edit_positions_container">
                                        <!-- Dynamic position sections will be inserted here by JavaScript -->
                                    </div>

                                    <div class="d-flex justify-content-end mt-3">
                                        <button
                                            type="button"
                                            class="btn btn-secondary"
                                            id="addPositionBtn">
                                            Add Position
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div
                            class="tab-pane fade"
                            id="task-images"
                            role="tabpanel"
                            aria-labelledby="task-images-tab">

                            <div class="module-card pst-nested-card">
                                <div class="module-card-header">
                                    <h5 class="mb-0">Images</h5>
                                </div>

                                <div class="module-card-body">
                                    <label for="pst_task_edit_task_images" class="form-label">Images</label>
                                    <select class="form-select" id="pst_task_edit_task_images" multiple>
                                        <option value="" disabled>Select or search for images</option>
                                    </select>

                                    <div class="d-flex justify-content-end mt-2">
                                        <button id="saveImagesBtn" class="btn btn-primary" type="button">
                                            Save Images
                                        </button>
                                    </div>

                                    <div id="pst_task_edit_selected_images" class="selected-items-display-box mt-2"></div>
                                </div>
                            </div>
                        </div>

                        <div
                            class="tab-pane fade"
                            id="task-parts"
                            role="tabpanel"
                            aria-labelledby="task-parts-tab">

                            <div class="module-card pst-nested-card">
                                <div class="module-card-header">
                                    <h5 class="mb-0">Parts</h5>
                                </div>

                                <div class="module-card-body">
                                    <label for="pst_task_edit_task_parts" class="form-label">Parts</label>
                                    <select class="form-select" id="pst_task_edit_task_parts" multiple>
                                        <option value="" disabled>Select or search for parts</option>
                                    </select>

                                    <div class="d-flex justify-content-end mt-2">
                                        <button id="savePartsBtn" class="btn btn-primary" type="button">
                                            Save Parts
                                        </button>
                                    </div>

                                    <div id="pst_task_edit_selected_parts" class="selected-items-display-box mt-2"></div>
                                </div>
                            </div>
                        </div>

                        <div
                            class="tab-pane fade"
                            id="task-drawings"
                            role="tabpanel"
                            aria-labelledby="task-drawings-tab">

                            <div class="module-card pst-nested-card">
                                <div class="module-card-header">
                                    <h5 class="mb-0">Drawings</h5>
                                </div>

                                <div class="module-card-body">
                                    <label for="pst_task_edit_task_drawings" class="form-label">Drawings</label>
                                    <select class="form-select" id="pst_task_edit_task_drawings" multiple>
                                        <option value="" disabled>Select or search for drawings</option>
                                    </select>

                                    <div class="d-flex justify-content-end mt-2">
                                        <button id="saveDrawingsBtn" class="btn btn-primary" type="button">
                                            Save Drawings
                                        </button>
                                    </div>

                                    <div id="pst_task_edit_selected_drawings" class="selected-items-display-box mt-2"></div>
                                </div>
                            </div>
                        </div>

                        <div
                            class="tab-pane fade"
                            id="task-documents"
                            role="tabpanel"
                            aria-labelledby="task-documents-tab">

                            <div class="module-card pst-nested-card">
                                <div class="module-card-header">
                                    <h5 class="mb-0">Documents</h5>
                                </div>

                                <div class="module-card-body">
                                    <label for="pst_task_edit_task_documents" class="form-label">Documents</label>
                                    <select class="form-select" id="pst_task_edit_task_documents" multiple>
                                        <option value="" disabled>Select or search for documents</option>
                                    </select>

                                    <div class="d-flex justify-content-end mt-2">
                                        <button id="saveDocumentsBtn" class="btn btn-primary" type="button">
                                            Save Documents
                                        </button>
                                    </div>

                                    <div id="pst_task_edit_selected_documents" class="selected-items-display-box mt-2"></div>
                                </div>
                            </div>
                        </div>

                        <div
                            class="tab-pane fade"
                            id="task-tools"
                            role="tabpanel"
                            aria-labelledby="task-tools-tab">

                            <div class="module-card pst-nested-card">
                                <div class="module-card-header">
                                    <h5 class="mb-0">Tools Configuration</h5>
                                </div>

                                <div class="module-card-body">
                                    <div class="mb-3">
                                        <label for="pst_task_edit_task_tools" class="form-label">
                                            Available Tools
                                        </label>

                                        <select class="form-select" id="pst_task_edit_task_tools" multiple>
                                            <option value="" disabled>Select or search for tools</option>
                                            <option value="tool1">Tool 1</option>
                                            <option value="tool2">Tool 2</option>
                                            <option value="tool3">Tool 3</option>
                                        </select>
                                    </div>

                                    <div class="d-flex justify-content-end mt-2">
                                        <button id="saveToolsBtn" class="btn btn-primary" type="button">
                                            Save Tools
                                        </button>
                                    </div>

                                    <div id="pst_task_edit_selected_tools" class="selected-items-display-box mt-2"></div>
                                </div>
                            </div>
                        </div>

                    </div>
                </div>
            </section>

        </div>
    </section>

</div>
