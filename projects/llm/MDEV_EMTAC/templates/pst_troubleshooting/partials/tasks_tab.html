<!-- Tasks Tab Content Partial -->
<div class="tab-pane fade pst-tab-pane" id="task" role="tabpanel" aria-labelledby="task-tab">

    <section class="module-panel pst-panel">
        <header class="module-panel-header pst-panel-header">
            <div>
                <h4 class="module-panel-title mb-1">Tasks for Selected Solution</h4>
                <p class="module-panel-subtitle mb-0">
                    View, remove, or add tasks connected to the currently selected solution.
                </p>
            </div>
        </header>

        <div class="module-panel-body pst-panel-body">
            <div class="row g-3">

                <div class="col-12 col-xl-5">
                    <div class="module-card pst-section-card h-100">
                        <div class="module-card-header">
                            <h5 class="mb-0">Existing Tasks</h5>
                        </div>

                        <div class="module-card-body">
                            <div class="mb-3">
                                <label for="existing_tasks" class="form-label">
                                    Select a Task to Edit
                                </label>

                                <select
                                    class="form-select"
                                    id="existing_tasks"
                                    size="8"
                                    multiple
                                    aria-describedby="existingTasksHelp">
                                </select>

                                <div id="existingTasksHelp" class="form-text">
                                    Double-click a task to open it in the Edit Task tab.
                                </div>
                            </div>

                            <div class="d-flex justify-content-end">
                                <button
                                    type="button"
                                    class="btn btn-danger"
                                    id="removeTaskBtn">
                                    Remove Selected Task
                                </button>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="col-12 col-xl-7">
                    <div class="module-card pst-section-card h-100">
                        <div class="module-card-header">
                            <h5 class="mb-0">Add New Task</h5>
                        </div>

                        <div class="module-card-body">
                            <div class="mb-3">
                                <label for="new_task_name" class="form-label">Task Name</label>
                                <input
                                    type="text"
                                    class="form-control"
                                    id="new_task_name"
                                    required>
                            </div>

                            <div class="mb-3">
                                <label for="new_task_description" class="form-label">
                                    Task Description
                                </label>
                                <textarea
                                    class="form-control"
                                    id="new_task_description"
                                    rows="4"></textarea>
                            </div>

                            <div class="d-flex justify-content-end">
                                <button
                                    type="button"
                                    class="btn btn-primary"
                                    id="addTaskBtn">
                                    Add Task
                                </button>
                            </div>

                            <div id="new-tasks-container" class="mt-3"></div>
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </section>

</div>
